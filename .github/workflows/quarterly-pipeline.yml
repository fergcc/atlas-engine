name: Quarterly Pipeline

on:
  schedule:
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'live'
        type: choice
        options: [live, mock, mixed]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install . openpyxl

      - name: Run pipeline
        env:
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
        run: |
          python -c "
          import logging, sys, traceback
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(name)s: %(message)s')
          from src.services.live.run_live import run_live_pipeline
          try:
              m = run_live_pipeline()
              if m:
                  print(f'Pipeline: mode={m.get(\"mode\")}, sectors={len(m.get(\"sectors\",[]))}, pairs={len(m.get(\"pairs\",[]))}')
              else:
                  print('Pipeline returned None')
                  sys.exit(1)
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Commit data
        run: |
          git config user.name "atlas-bot"
          git config user.email "bot@atlas-project.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "Committing pipeline data..."
            git commit -m "data: auto pipeline run [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
